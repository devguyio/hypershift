apiVersion: v1
kind: Service
metadata:
  name: hc-node-selector-webhook
  namespace: hypershift
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: hc-node-selector-webhook-serving-cert
spec:
  selector:
    app: hc-node-selector-webhook
  ports:
    - protocol: TCP
      port: 443
      targetPort: 8443
