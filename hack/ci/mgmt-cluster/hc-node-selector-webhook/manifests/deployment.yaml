apiVersion: apps/v1
kind: Deployment
metadata:
  name: hc-node-selector-webhook
  namespace: hypershift
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hc-node-selector-webhook
  template:
    metadata:
      labels:
        app: hc-node-selector-webhook
    spec:
      serviceAccountName: hc-node-selector-webhook
      priorityClassName: system-cluster-critical
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: hc-node-selector-webhook
      containers:
        - name: webhook
          image: quay.io/hypershift/hc-node-selector-webhook:v0.2.0
          imagePullPolicy: Always
          args:
            - -group=hypershift.openshift.io
            - -resource=hostedclusters
          ports:
            - containerPort: 8443
          env:
            - name: LOG_LEVEL
              value: info
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: webhook-certs
              mountPath: /etc/webhook/certs
              readOnly: true
      volumes:
        - name: webhook-certs
          secret:
            secretName: hc-node-selector-webhook-serving-cert
